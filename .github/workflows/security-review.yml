name: security-review

# LLM-driven security review. Runs security-review.agent.md on PRs that touch
# auth, secrets, crypto, workflows, or input validation paths. PRs that don't
# touch those paths post a passing `security-review verdict` check-run so the
# gate can be marked required in branch protection without blocking unrelated PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write
  models: read

concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    name: security-review verdict
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Collect PR context + decide skip
        id: ctx
        run: |
          set -euo pipefail
          SKIP_REASON=""
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            SKIP_REASON="draft"
          elif [[ "${{ github.event.pull_request.user.login }}" == "dependabot[bot]" ]]; then
            SKIP_REASON="dependabot"
          fi

          mapfile -t FILES < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')

          # In-scope: auth, session, crypto, secrets, workflows, API routes,
          # or any file whose name suggests security-sensitive handling
          IN_SCOPE=false
          for f in "${FILES[@]}"; do
            if [[ "$f" == src/lib/auth* ]] || \
               [[ "$f" == src/lib/db* ]] || \
               [[ "$f" == src/middleware* ]] || \
               [[ "$f" == src/app/api/* ]] || \
               [[ "$f" == .github/workflows/* ]] || \
               [[ "$f" == .env* ]] || \
               [[ "$f" == compose.yml ]] || \
               [[ "$f" == Dockerfile ]] || \
               [[ "$f" == *secret* ]] || \
               [[ "$f" == *auth* ]] || \
               [[ "$f" == *crypto* ]] || \
               [[ "$f" == *session* ]]; then
              IN_SCOPE=true
              break
            fi
          done
          if [[ "$IN_SCOPE" == "false" && -z "$SKIP_REASON" ]]; then
            SKIP_REASON="no-security-sensitive-changes"
          fi

          {
            echo "skip_reason=${SKIP_REASON}"
            echo "changed_files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run security-review agent (GitHub Models)
        if: steps.ctx.outputs.skip_reason == ''
        id: review
        run: |
          set -euo pipefail

          diff_content="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" -H 'Accept: application/vnd.github.v3.diff')"
          prompt_content="$(cat .github/agents/security-review.agent.md)"
          changed_files="${{ steps.ctx.outputs.changed_files }}"

          jq -n \
            --arg pr "$PR_NUMBER" \
            --arg base "$BASE_SHA" \
            --arg head "$HEAD_SHA" \
            --arg files "$changed_files" \
            --arg diff "$diff_content" \
            --arg prompt "$prompt_content" \
            '{
              model: "gpt-4.1",
              temperature: 0.1,
              messages: [
                {
                  role: "system",
                  content: "You are the game-club security-review agent. Apply the conventions in the supplied security-review.agent.md verbatim. This is a Next.js 15 app with TypeScript, better-sqlite3, cookie-based sessions (SHA256+salt), and Docker. Focus areas: OWASP Top 10 (especially injection, broken auth, security misconfig), secrets in code, unvalidated input at API boundaries, session/cookie security, SQL injection via unparameterized queries, RAWG API proxy safety. Use REQUEST_CHANGES only for real security vulnerabilities. Use COMMENT for non-blocking recommendations. Use APPROVE when the change is secure. Output strict JSON: {\"verdict\":\"APPROVE|REQUEST_CHANGES|COMMENT\",\"summary\":\"string\",\"findings_markdown\":\"string\"}"
                },
                {
                  role: "user",
                  content: ("Review this PR for security issues.\n\nPR: #" + $pr + "\nBase SHA: " + $base + "\nHead SHA: " + $head + "\n\nChanged files:\n" + $files + "\n\nFull diff:\n" + $diff + "\n\nSecurity review conventions (.github/agents/security-review.agent.md):\n" + $prompt)
                }
              ]
            }' > /tmp/security-req.json

          curl -fsSL "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/security-req.json > /tmp/security-resp.json

          raw="$(jq -r '.choices[0].message.content // ""' /tmp/security-resp.json)"
          parsed="$(RAW="$raw" python3 -c 'import os; s=os.environ["RAW"].strip(); s="\n".join(l for l in s.splitlines() if not l.strip().startswith("```")).strip() if s.startswith("```") else s; i,j=s.find("{"),s.rfind("}"); print(s[i:j+1] if i!=-1 and j>=i else s)')"

          if printf '%s' "$parsed" | jq -e . >/dev/null 2>&1; then
            verdict=$(printf '%s' "$parsed" | jq -r '.verdict // "COMMENT"' | tr '[:lower:]' '[:upper:]')
            summary=$(printf '%s' "$parsed" | jq -r '.summary // "Security review completed."')
            findings=$(printf '%s' "$parsed" | jq -r '.findings_markdown // "No issues found."')
          else
            verdict="COMMENT"
            summary="Security response could not be parsed; posted as comment."
            findings="$raw"
          fi
          case "$verdict" in
            APPROVE|REQUEST_CHANGES|COMMENT) ;;
            *) verdict="COMMENT" ;;
          esac

          {
            echo "verdict=${verdict}"
            echo "summary<<EOF"
            printf '%s\n' "$summary"
            echo "EOF"
            echo "findings<<EOF"
            printf '%s\n' "$findings"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set skip verdict
        if: steps.ctx.outputs.skip_reason != ''
        id: skipped
        run: |
          set -euo pipefail
          reason="${{ steps.ctx.outputs.skip_reason }}"
          {
            echo "verdict=COMMENT"
            echo "summary=Security review skipped (${reason})."
            echo "findings<<EOF"
            echo "Security review skipped for this PR (${reason})."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish PR review (when in-scope)
        if: steps.ctx.outputs.skip_reason == ''
        env:
          VERDICT: ${{ steps.review.outputs.verdict }}
          SUMMARY: ${{ steps.review.outputs.summary }}
          FINDINGS: ${{ steps.review.outputs.findings }}
        run: |
          set -euo pipefail
          {
            echo "security-review verdict: $VERDICT"
            echo
            echo "$SUMMARY"
            echo
            echo "$FINDINGS"
          } > /tmp/security-review-body.txt
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
            -f event='COMMENT' \
            -F body=@/tmp/security-review-body.txt >/dev/null

      - name: Publish security-review check-run
        if: always()
        env:
          IN_SCOPE_VERDICT: ${{ steps.review.outputs.verdict }}
          IN_SCOPE_SUMMARY: ${{ steps.review.outputs.summary }}
          IN_SCOPE_FINDINGS: ${{ steps.review.outputs.findings }}
          SKIP_VERDICT: ${{ steps.skipped.outputs.verdict }}
          SKIP_SUMMARY: ${{ steps.skipped.outputs.summary }}
          SKIP_FINDINGS: ${{ steps.skipped.outputs.findings }}
          SKIP_REASON: ${{ steps.ctx.outputs.skip_reason }}
        run: |
          set -euo pipefail
          if [ -z "$SKIP_REASON" ]; then
            VERDICT="$IN_SCOPE_VERDICT"
            SUMMARY="$IN_SCOPE_SUMMARY"
            FINDINGS="$IN_SCOPE_FINDINGS"
          else
            VERDICT="$SKIP_VERDICT"
            SUMMARY="$SKIP_SUMMARY"
            FINDINGS="$SKIP_FINDINGS"
          fi

          conclusion='success'
          if [ "$VERDICT" = "REQUEST_CHANGES" ]; then
            conclusion='failure'
          fi
          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          existing_id="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs?check_name=security-review" --jq '.check_runs[0].id // empty')"
          payload=$(jq -n \
            --arg head_sha "$HEAD_SHA" \
            --arg completed_at "$completed_at" \
            --arg conclusion "$conclusion" \
            --arg title "security-review: $VERDICT" \
            --arg text "$FINDINGS" \
            '{name:"security-review",head_sha:$head_sha,status:"completed",conclusion:$conclusion,completed_at:$completed_at,output:{title:$title,summary:$title,text:$text}}')

          if [ -n "$existing_id" ]; then
            update=$(jq 'del(.name,.head_sha)' <<<"$payload")
            gh api "repos/${GITHUB_REPOSITORY}/check-runs/${existing_id}" -X PATCH --input - <<<"$update" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/check-runs" -X POST --input - <<<"$payload" >/dev/null
          fi
