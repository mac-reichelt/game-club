name: agent-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write
  models: read

concurrency:
  group: agent-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  agent-review:
    name: agent-review verdict
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Collect PR context + evaluate skips
        id: context
        run: |
          set -euo pipefail

          SKIP_REASON=""
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            SKIP_REASON="draft"
          elif [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            SKIP_REASON="dependabot"
          fi

          mapfile -t FILES < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')

          DOCS_ONLY=true
          if [[ "${#FILES[@]}" -eq 0 ]]; then
            DOCS_ONLY=false
          fi
          for file in "${FILES[@]}"; do
            if [[ "$file" != docs/* && "$file" != *.md && "$file" != ".github/dependabot.yml" ]]; then
              DOCS_ONLY=false
              break
            fi
          done
          if [[ "$DOCS_ONLY" == "true" && -z "$SKIP_REASON" ]]; then
            SKIP_REASON="docs-only"
          fi

          {
            echo "skip_reason=${SKIP_REASON}"
            echo "changed_files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run code-review agent (GitHub Models)
        id: review
        if: steps.context.outputs.skip_reason == ''
        run: |
          set -euo pipefail

          diff_content="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" -H "Accept: application/vnd.github.v3.diff")"
          prompt_content="$(cat .github/agents/code-review.agent.md)"
          changed_files="${{ steps.context.outputs.changed_files }}"

          jq -n \
            --arg pr_number "${PR_NUMBER}" \
            --arg base_sha "${BASE_SHA}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg changed_files "${changed_files}" \
            --arg diff_content "${diff_content}" \
            --arg prompt_content "${prompt_content}" \
            '{
              model: "gpt-4.1",
              temperature: 0.1,
              messages: [
                {
                  role: "system",
                  content: "You are the game-club code-review agent reviewer. You MUST apply the full conventions and checklist provided in the attached .github/agents/code-review.agent.md content. Return strict JSON: {\"verdict\":\"APPROVE|REQUEST_CHANGES|COMMENT\",\"summary\":\"string\",\"findings_markdown\":\"string\"}. Use REQUEST_CHANGES only for real blocking issues. Use COMMENT for non-blocking notes or when no blockers exist."
                },
                {
                  role: "user",
                  content: (
                    "Review this PR.\n\n" +
                    "PR: #" + $pr_number + "\n" +
                    "Base SHA: " + $base_sha + "\n" +
                    "Head SHA: " + $head_sha + "\n\n" +
                    "Changed files:\n" + $changed_files + "\n\n" +
                    "Full diff:\n" + $diff_content + "\n\n" +
                    "Project review conventions (.github/agents/code-review.agent.md):\n" + $prompt_content
                  )
                }
              ]
            }' > /tmp/agent-review-request.json

          curl -fsSL "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/agent-review-request.json > /tmp/agent-review-response.json

          if ! jq -e '.choices[0].message.content' /tmp/agent-review-response.json >/dev/null 2>&1; then
            {
              echo "verdict=COMMENT"
              echo "summary=Agent response was not in the expected format."
              echo "findings<<EOF"
              jq -c . /tmp/agent-review-response.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          raw_content="$(jq -r '.choices[0].message.content // ""' /tmp/agent-review-response.json)"
          parsed_json="$(RAW_CONTENT="$raw_content" python -c 'import os; s=os.environ["RAW_CONTENT"].strip(); s="\n".join(l for l in s.splitlines() if not l.strip().startswith("```")).strip() if s.startswith("```") else s; start=s.find("{"); end=s.rfind("}"); print(s[start:end+1] if start!=-1 and end!=-1 and end>=start else s)')"

          if printf '%s' "$parsed_json" | jq -e . >/dev/null 2>&1; then
            verdict="$(printf '%s' "$parsed_json" | jq -r '.verdict // "COMMENT"' | tr '[:lower:]' '[:upper:]')"
            summary="$(printf '%s' "$parsed_json" | jq -r '.summary // "Agent review completed."')"
            findings="$(printf '%s' "$parsed_json" | jq -r '.findings_markdown // "No issues found."')"
          else
            verdict="COMMENT"
            summary="Agent response could not be parsed; posted as comment."
            findings="$raw_content"
          fi

          case "$verdict" in
            APPROVE|REQUEST_CHANGES|COMMENT) ;;
            *) verdict="COMMENT" ;;
          esac

          {
            echo "verdict=${verdict}"
            echo "summary<<EOF"
            printf '%s\n' "$summary"
            echo "EOF"
            echo "findings<<EOF"
            printf '%s\n' "$findings"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set skip verdict
        id: skipped
        if: steps.context.outputs.skip_reason != ''
        run: |
          set -euo pipefail
          reason="${{ steps.context.outputs.skip_reason }}"

          {
            echo "verdict=COMMENT"
            echo "summary=Agent review skipped (${reason})."
            echo "findings<<EOF"
            echo "Agent review skipped for this PR (${reason})."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish PR review comment
        env:
          SKIP_REASON: ${{ steps.context.outputs.skip_reason }}
          REVIEW_VERDICT: ${{ steps.review.outputs.verdict }}
          REVIEW_SUMMARY: ${{ steps.review.outputs.summary }}
          REVIEW_FINDINGS: ${{ steps.review.outputs.findings }}
          SKIPPED_VERDICT: ${{ steps.skipped.outputs.verdict }}
          SKIPPED_SUMMARY: ${{ steps.skipped.outputs.summary }}
          SKIPPED_FINDINGS: ${{ steps.skipped.outputs.findings }}
        run: |
          set -euo pipefail

          if [[ -z "$SKIP_REASON" ]]; then
            verdict="$REVIEW_VERDICT"
            summary="$REVIEW_SUMMARY"
            findings="$REVIEW_FINDINGS"
          else
            verdict="$SKIPPED_VERDICT"
            summary="$SKIPPED_SUMMARY"
            findings="$SKIPPED_FINDINGS"
          fi

          # Build body via heredoc so LLM-controlled bytes never hit any
          # shell substitution context (no backticks/$()/etc. evaluated).
          {
            echo "agent-review verdict: $verdict"
            echo
            echo "$summary"
            echo
            echo "$findings"
          } > /tmp/agent-review-body.md

          # Use jq --rawfile to inject the body without any shell substitution
          jq -n --rawfile body /tmp/agent-review-body.md '{event:"COMMENT", body:$body}' \
            | gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" --input - >/dev/null

      - name: Publish agent-review check run
        env:
          SKIP_REASON: ${{ steps.context.outputs.skip_reason }}
          REVIEW_VERDICT: ${{ steps.review.outputs.verdict }}
          REVIEW_SUMMARY: ${{ steps.review.outputs.summary }}
          REVIEW_FINDINGS: ${{ steps.review.outputs.findings }}
          SKIPPED_VERDICT: ${{ steps.skipped.outputs.verdict }}
          SKIPPED_SUMMARY: ${{ steps.skipped.outputs.summary }}
          SKIPPED_FINDINGS: ${{ steps.skipped.outputs.findings }}
        run: |
          set -euo pipefail

          if [[ -z "$SKIP_REASON" ]]; then
            verdict="$REVIEW_VERDICT"
            summary="$REVIEW_SUMMARY"
            findings="$REVIEW_FINDINGS"
          else
            verdict="$SKIPPED_VERDICT"
            summary="$SKIPPED_SUMMARY"
            findings="$SKIPPED_FINDINGS"
          fi

          conclusion="neutral"
          if [[ "$verdict" == "APPROVE" ]]; then
            conclusion="success"
          elif [[ "$verdict" == "REQUEST_CHANGES" ]]; then
            conclusion="failure"
          fi

          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          details_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          existing_id="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs?check_name=agent-review" -H "Accept: application/vnd.github+json" --jq '.check_runs[0].id // empty')"

          create_payload="$(jq -n \
            --arg head_sha "${HEAD_SHA}" \
            --arg completed_at "${completed_at}" \
            --arg conclusion "${conclusion}" \
            --arg details_url "${details_url}" \
            --arg title "${summary}" \
            --arg text "${findings}" \
            '{
              name: "agent-review",
              head_sha: $head_sha,
              status: "completed",
              conclusion: $conclusion,
              completed_at: $completed_at,
              details_url: $details_url,
              output: {
                title: $title,
                summary: $title,
                text: $text
              }
            }')"

          update_payload="$(jq -n \
            --arg completed_at "${completed_at}" \
            --arg conclusion "${conclusion}" \
            --arg details_url "${details_url}" \
            --arg title "${summary}" \
            --arg text "${findings}" \
            '{
              status: "completed",
              conclusion: $conclusion,
              completed_at: $completed_at,
              details_url: $details_url,
              output: {
                title: $title,
                summary: $title,
                text: $text
              }
            }')"

          if [[ -n "$existing_id" ]]; then
            gh api "repos/${GITHUB_REPOSITORY}/check-runs/${existing_id}" \
              -X PATCH \
              --input - <<<"$update_payload" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
              -X POST \
              --input - <<<"$create_payload" >/dev/null
          fi
